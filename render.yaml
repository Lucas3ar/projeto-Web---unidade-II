services:
  - type: web
    name: retro-games-store
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: DB_URL
        fromDatabase:
          name: retro-games-db
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: retro-games-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: retro-games-db
          property: password
      - key: PORT
        value: 8080

databases:
  - name: retro-games-db
    plan: free
    databaseName: retrodb
    user: retro_user

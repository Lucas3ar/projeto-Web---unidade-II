<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{layout :: head('Entrar')}"></head>
<body class="retro-bg"><nav th:replace="~{layout :: nav}"></nav>
<main class="container py-5"><div class="card card-retro p-4 mx-auto" style="max-width:420px;"><h2 class="mb-3">Acessar conta</h2>
<div th:if="${param.error}" class="alert alert-danger">Usuario ou senha invalidos.</div>
<div th:if="${param.logout}" class="alert alert-info">Voce saiu com sucesso.</div>
<form method="post" th:action="@{/login}">
<label class="form-label">Usuario</label><input class="form-control mb-3" type="text" name="username" required>
<label class="form-label">Senha</label><input class="form-control mb-3" type="password" name="password" required>
<button class="btn btn-retro w-100" type="submit">Entrar</button>
</form></div></main>
<footer th:replace="~{layout :: footer}"></footer></body></html>

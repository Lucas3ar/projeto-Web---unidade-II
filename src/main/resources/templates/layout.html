<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Retro Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:fragment="nav" class="navbar navbar-expand-lg nav-retro sticky-top">
    <div class="container">
        <a class="navbar-brand brand-retro" th:href="@{/index}">Retro Store</a>
        <div class="d-flex align-items-center gap-2">
            <a class="btn btn-retro-outline btn-sm" th:href="@{/index}">Catalogo</a>
            <a class="btn btn-retro-outline btn-sm" th:href="@{/verCarrinho}">🛒 Carrinho</a>
            <a sec:authorize="hasRole('ADMIN')" class="btn btn-retro-outline btn-sm" th:href="@{/admin}">Admin</a>
            <span class="chip-user" sec:authentication="name"></span>
        </div>
    </div>
</nav>
<footer th:fragment="footer" class="footer-retro text-center py-4 mt-5">
    <div class="container">
        <small>Arcade Classics 2026 - Fase desbloqueada para colecionadores retro.</small>
    </div>
</footer>
</body>
</html>

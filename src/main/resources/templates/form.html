<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{layout :: head('Cadastro')}"></head><body><nav th:replace="~{layout :: nav}"></nav>
<main class="container py-4"><div class="card card-retro p-4"><form th:action="@{/salvar}" th:object="${form}" method="post"><input type="hidden" th:field="*{id}">
<input class="form-control mb-2" th:field="*{title}" placeholder="Titulo"><div class="text-danger" th:errors="*{title}"></div>
<input class="form-control mb-2" th:field="*{platform}" placeholder="Plataforma"><div class="text-danger" th:errors="*{platform}"></div>
<input class="form-control mb-2" th:field="*{genre}" placeholder="Genero"><div class="text-danger" th:errors="*{genre}"></div>
<input class="form-control mb-2" th:field="*{skuCode}" placeholder="AAA-1234"><div class="text-danger" th:errors="*{skuCode}"></div>
<textarea class="form-control mb-2" th:field="*{description}" placeholder="Descricao"></textarea><div class="text-danger" th:errors="*{description}"></div>
<input type="number" step="0.01" class="form-control mb-2" th:field="*{price}" placeholder="Preco"><div class="text-danger" th:errors="*{price}"></div>
<input class="form-control mb-2" th:field="*{imageUrl}" placeholder="/img/minha-foto.png ou URL https://...">
<button class="btn btn-retro" type="submit">Salvar</button></form></div></main><footer th:replace="~{layout :: footer}"></footer></body></html>
